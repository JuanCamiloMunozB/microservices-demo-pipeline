services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
  kafka-init:
    image: confluentinc/cp-kafka:7.7.8
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-lc"]
    command: >
      '
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic votes --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote-results-updated --partitions 1 --replication-factor 1
      '
  vote:
    image: ghcr.io/juancamilomunozb/microservices-demo/vote:${IMAGE_TAG:-latest}
    env_file:
      - ./vote/.env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
  worker:
    image: ghcr.io/juancamilomunozb/microservices-demo/worker:${IMAGE_TAG:-latest}
    env_file:
      - ./worker/.env
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
  result:
    image: ghcr.io/juancamilomunozb/microservices-demo/result:${IMAGE_TAG:-latest}
    env_file:
      - ./result/.env
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "4000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
volumes:
  postgres_data:
